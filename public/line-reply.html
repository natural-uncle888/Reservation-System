<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LINE 回覆文字複製</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #f3f4f6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }
    .card {
      width: 100%;
      max-width: 720px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, .08);
      overflow: hidden;
    }
    .header {
      padding: 18px 20px;
      background: #111827;
      color: #f9fafb;
    }
    .header h1 { margin: 0; font-size: 20px; }
    .header p { margin: 6px 0 0; color: #d1d5db; font-size: 14px; line-height: 1.6; }
    .body { padding: 18px 20px 22px; }
    textarea {
      width: 100%;
      min-height: 280px;
      resize: vertical;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      line-height: 1.75;
      color: #111827;
      background: #f9fafb;
      outline: none;
    }
    textarea:focus { border-color: #16a34a; box-shadow: 0 0 0 3px rgba(22, 163, 74, .15); }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    button, a.btn {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .copy { background: #16a34a; color: #fff; }
    .line { background: #06c755; color: #fff; }
    .status { margin-top: 10px; color: #15803d; font-size: 14px; min-height: 22px; }
    .hint { margin-top: 10px; color: #6b7280; font-size: 13px; line-height: 1.6; }
  </style>
</head>
<body>
  <main class="card">
    <div class="header">
      <h1>LINE 回覆文字</h1>
      <p>確認文字無誤後，按「一鍵複製」再貼到 LINE 回覆客人。</p>
    </div>
    <div class="body">
      <textarea id="replyText" aria-label="LINE 回覆文字"></textarea>
      <div class="actions">
        <button class="copy" id="copyBtn" type="button">一鍵複製</button>
        <a class="btn line" id="lineShare" href="#" target="_blank" rel="noopener">開啟 LINE 分享</a>
      </div>
      <div class="status" id="status"></div>
      <div class="hint">若手機或瀏覽器不允許自動複製，可長按上方文字框全選複製。</div>
    </div>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const text = params.get("text") || "";
    const textarea = document.getElementById("replyText");
    const statusEl = document.getElementById("status");
    const lineShare = document.getElementById("lineShare");

    textarea.value = text;
    lineShare.href = "https://line.me/R/share?text=" + encodeURIComponent(text);

    document.getElementById("copyBtn").addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(textarea.value);
        statusEl.textContent = "已複製，可以貼到 LINE 了。";
      } catch (err) {
        textarea.focus();
        textarea.select();
        const ok = document.execCommand("copy");
        statusEl.textContent = ok ? "已複製，可以貼到 LINE 了。" : "瀏覽器不允許自動複製，請手動全選複製。";
      }
    });
  </script>
</body>
</html>
